<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Row Bienes Raíces</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      color: #222;
    }
    .box {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
    }
    button {
      padding: 12px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>ROW Bienes Raíces</h1>
    <p>Asesoría inmobiliaria con enfoque directo y profesional.</p>

    <h2>Déjanos tus datos</h2>

    <form>
      <input type="text" placeholder="Nombre" required>
      <input type="text" placeholder="Teléfono" required>
      <input type="email" placeholder="Correo" required>
      <textarea placeholder="Cuéntanos qué necesitas"></textarea>
      <button type="submit">Solicitar contacto</button>
    </form>
  </div>
</body>
</html>
